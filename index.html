<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grants Team Strengths Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #f0ece4; font-family: Georgia, serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn 0.3s ease; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f1117; }
    ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const {
  PieChart, Pie, Cell, Sector, ResponsiveContainer,
  RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis
} = Recharts;

const DOMAIN_META = {
  "Relationship Building": { short: "RB", color: "#4a9b6f" },
  "Executing":             { short: "EX", color: "#3a7db5" },
  "Strategic Thinking":    { short: "ST", color: "#7c5cbf" },
  "Influencing":           { short: "IN", color: "#d4763b" },
};

const DOMAIN_MAP = {
  Achiever:"Executing", Arranger:"Executing", Belief:"Executing", Consistency:"Executing",
  Deliberative:"Executing", Discipline:"Executing", Focus:"Executing",
  Responsibility:"Executing", Restorative:"Executing",
  Activator:"Influencing", Command:"Influencing", Communication:"Influencing",
  Competition:"Influencing", Maximizer:"Influencing", Significance:"Influencing", Woo:"Influencing",
  "Self-Assurance":"Influencing",
  Adaptability:"Relationship Building", Connectedness:"Relationship Building",
  Developer:"Relationship Building", Empathy:"Relationship Building",
  Harmony:"Relationship Building", Includer:"Relationship Building",
  Individualization:"Relationship Building", Positivity:"Relationship Building",
  Relator:"Relationship Building",
  Analytical:"Strategic Thinking", Context:"Strategic Thinking", Futuristic:"Strategic Thinking",
  Ideation:"Strategic Thinking", Input:"Strategic Thinking", Intellection:"Strategic Thinking",
  Learner:"Strategic Thinking", Strategic:"Strategic Thinking",
};

const MEMBERS = [
  { name:"Leah Curtsinger",  first:"Leah",     color:"#e05c8a", top10:["Empathy","Individualization","Strategic","Arranger","Belief","Communication","Developer","Learner","Ideation","Connectedness"] },
  { name:"Peter Droege",     first:"Peter",    color:"#4a9b6f", top10:["Connectedness","Achiever","Belief","Strategic","Arranger","Positivity","Learner","Responsibility","Developer","Context"] },
  { name:"Jonathan Finer",   first:"Jonathan", color:"#3a7db5", top10:["Consistency","Context","Empathy","Harmony","Developer","Positivity","Relator","Belief","Communication","Discipline"] },
  { name:"Nick Loyacona",    first:"Nick",     color:"#888888", top10:["Developer","Responsibility","Analytical","Relator","Belief","Positivity","Learner","Input","Discipline","Communication"] },
  { name:"Andrea Nelson",    first:"Andrea",   color:"#7c5cbf", top10:["Relator","Consistency","Achiever","Harmony","Deliberative","Empathy","Strategic","Adaptability","Developer","Arranger"] },
  { name:"Luke Ragland",     first:"Luke",     color:"#c0a020", top10:["Achiever","Woo","Context","Competition","Communication","Maximizer","Positivity","Strategic","Learner","Individualization"] },
  { name:"Jake Stratman",    first:"Jake",     color:"#20a0c0", top10:["Relator","Adaptability","Ideation","Arranger","Woo","Positivity","Context","Intellection","Communication","Connectedness"] },
  { name:"Allison Stuart",   first:"Allison",  color:"#f472b6", top10:["Communication","Arranger","Woo","Strategic","Significance","Achiever","Individualization","Positivity","Focus","Activator"] },
  { name:"Richard Yates",    first:"Richard",  color:"#d4763b", top10:["Learner","Achiever","Intellection","Competition","Consistency","Restorative","Analytical","Input","Arranger","Self-Assurance"] },
];

const DOMAINS = ["Executing","Influencing","Relationship Building","Strategic Thinking"];
const TOTAL = 90;

const domainCount = (strengths) => {
  const dc = {}; DOMAINS.forEach(d => dc[d] = 0);
  strengths.forEach(s => { if (DOMAIN_MAP[s]) dc[DOMAIN_MAP[s]]++; });
  return dc;
};

const memberDomains = MEMBERS.map(m => ({ ...m, dc: domainCount(m.top10) }));
const domainTotals = { "Relationship Building":28, "Executing":25, "Strategic Thinking":22, "Influencing":15 };
const domainData = Object.entries(domainTotals).map(([name, count]) => ({ name, count, ...DOMAIN_META[name] }));

const overlap = MEMBERS.map((a,i) =>
  MEMBERS.map((b,j) => {
    if (i===j) return { count:-1, shared:[] };
    const shared = a.top10.filter(s => b.top10.includes(s));
    return { count:shared.length, shared };
  })
);

const freq = {};
MEMBERS.forEach(m => m.top10.forEach(s => { freq[s] = (freq[s]||0)+1; }));
const sharedStrengths = Object.entries(freq).sort((a,b)=>b[1]-a[1]).filter(([,n])=>n>=3)
  .map(([s,n]) => {
    const domain = DOMAIN_MAP[s] || "Unknown";
    return { strength:s, count:n, domain,
      color:(DOMAIN_META[domain]||{color:"#888"}).color,
      who:MEMBERS.filter(m=>m.top10.includes(s)).map(m=>m.first) };
  });

const MOST_LIKELY = [
  { question:"Who is most likely to survive prison?",               emoji:"🔒", person:"Richard Yates",   color:"#d4763b", reason:"Learner, Achiever, Consistency, Restorative, and Self-Assurance. He would study the environment, establish a routine immediately, fix problems before they escalate, and his Self-Assurance means he would not be rattled or taken advantage of. He would be out of trouble and probably running the library within a week." },
  { question:"Who is most likely to start a cult?",                 emoji:"🙏", person:"Allison Stuart",  color:"#f472b6", reason:"Communication, Woo, Significance, Activator, Positivity. This is almost an unfair question. She can walk into a room of strangers and have them believing in something before they know what happened. Significance means she needs to make a big impact, and Activator means she will not wait around. The followers would come willingly." },
  { question:"Who is most likely to become a billionaire?",         emoji:"💰", person:"Luke Ragland",    color:"#c0a020", reason:"Achiever, Competition, Maximizer, Woo, Strategic. He is wired to win, obsessed with being first, constantly optimizing, and can charm anyone into a deal. Competition means he does not stop when he is ahead - he stops when everyone else is behind." },
  { question:"Who is most likely to be a superhero?",               emoji:"🦸", person:"Andrea Nelson",   color:"#7c5cbf", reason:"Relator, Empathy, Harmony, Deliberative, Developer. She would be the superhero who actually stops to help the person on the ground instead of just chasing the villain. Deliberative means she thinks before she leaps - no reckless destruction. She would be beloved by the city." },
  { question:"Who is most likely to be a villain henchman?",        emoji:"🎭", person:"Jake Stratman",   color:"#20a0c0", reason:"Relator, Woo, Ideation, Adaptability, Positivity. He would get recruited because he is fun to be around and full of creative schemes, but Adaptability means he would go along with the plan even if it kept changing. He would absolutely switch sides the moment he connected with the hero though." },
  { question:"Who is most likely to outsmart everyone in a heist?", emoji:"🧠", person:"Leah Curtsinger", color:"#e05c8a", reason:"Strategic, Ideation, Learner, Individualization, Empathy. She would be the one who figured out every persons weakness before the job, designed the plan around human psychology, and anticipated the double-cross three moves ahead." },
  { question:"Who is most likely to start a revolution?",           emoji:"🌍", person:"Peter Droege",    color:"#4a9b6f", reason:"Connectedness, Belief, Responsibility, Achiever, Developer. Deep convictions, a sense that everything is linked, and an unshakeable sense of duty. He would not start it loudly - he would quietly build the infrastructure until the movement was already unstoppable." },
  { question:"Who is most likely to start a wellness empire?",      emoji:"🧘", person:"Jonathan Finer",  color:"#3a7db5", reason:"Empathy, Harmony, Developer, Positivity, Relator. He would genuinely want to help people heal, would remember every clients story, and the whole brand would feel deeply human. People would trust him immediately and never leave." },
  { question:"Who is most likely to make a world-changing discovery?", emoji:"🔬", person:"Nick Loyacona", color:"#888888", reason:"Analytical, Learner, Input, Developer, Discipline. He would spend years quietly collecting data that nobody thought to connect, then one day hand everyone a conclusion that seems obvious in hindsight. He would also make sure his whole team got credit." },
];

const BG="#0f1117", CARD="#161820", BORDER="#2a2d3a", C="#f0ece4";

function Card({ children, style={} }) {
  return <div style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:"20px 22px", ...style }}>{children}</div>;
}
function SLabel({ children }) {
  return <div style={{ fontSize:10, letterSpacing:"0.25em", textTransform:"uppercase", color:"#555", fontFamily:"monospace", marginBottom:12 }}>{children}</div>;
}
function Tag({ children, color }) {
  return <span style={{ display:"inline-block", padding:"2px 8px", borderRadius:4, fontSize:11, background:color+"22", color, border:`1px solid ${color}44`, fontFamily:"monospace" }}>{children}</span>;
}
function ActiveShape({ cx, cy, innerRadius, outerRadius, startAngle, endAngle, fill }) {
  return (
    <g>
      <Sector cx={cx} cy={cy} innerRadius={innerRadius-5} outerRadius={outerRadius+10}
        startAngle={startAngle} endAngle={endAngle} fill={fill}
        style={{ filter:`drop-shadow(0 4px 16px ${fill}77)` }} />
    </g>
  );
}
function heatColor(n) {
  if (n===0) return { bg:"#1a1c26", text:"#333" };
  if (n===1) return { bg:"#1e2d3a", text:"#4a7a9b" };
  if (n===2) return { bg:"#1e3630", text:"#4a9b7a" };
  if (n===3) return { bg:"#2d3020", text:"#b0b040" };
  if (n===4) return { bg:"#3a2a18", text:"#d4903b" };
  return       { bg:"#3a2020", text:"#d46060" };
}

const TABS = ["Overview","Overlap Heatmap","Radar Chart","Most Likely To"];

function Dashboard() {
  const [tab, setTab]                   = useState("Overview");
  const [activeSlice, setActiveSlice]   = useState(null);
  const [activeShared, setActiveShared] = useState(null);
  const [hoverCell, setHoverCell]       = useState(null);
  const [visible, setVisible]           = useState(new Set(MEMBERS.map(m=>m.first)));
  const [revealed, setRevealed]         = useState(new Set());

  const activeDomain = activeSlice !== null ? domainData[activeSlice] : null;

  function toggleMember(first) {
    setVisible(prev => {
      const next = new Set(prev);
      if (next.has(first)) { if (next.size > 1) next.delete(first); }
      else next.add(first);
      return next;
    });
  }
  function toggleReveal(i) {
    setRevealed(prev => {
      const next = new Set(prev);
      next.has(i) ? next.delete(i) : next.add(i);
      return next;
    });
  }

  return (
    <div style={{ fontFamily:"Georgia,serif", background:BG, minHeight:"100vh", color:C, padding:"36px 24px", maxWidth:1000, margin:"0 auto" }}>

      <div style={{ marginBottom:28 }}>
        <div style={{ fontSize:10, letterSpacing:"0.3em", fontFamily:"monospace", color:"#555", marginBottom:8 }}>
          GRANTS TEAM · CLIFTONSTRENGTHS 2026
        </div>
        <h1 style={{ margin:0, fontSize:"clamp(24px,4vw,40px)", fontWeight:"normal", letterSpacing:"-0.02em", lineHeight:1.1 }}>
          Team Strengths Dashboard
        </h1>
        <p style={{ color:"#555", fontSize:13, marginTop:8, fontFamily:"monospace" }}>
          9 members · 90 top-10 themes · 4 domains
        </p>
      </div>

      <div style={{ display:"flex", gap:4, marginBottom:24, borderBottom:`1px solid ${BORDER}` }}>
        {TABS.map(t => (
          <button key={t} onClick={()=>setTab(t)} style={{
            background:"none", border:"none", cursor:"pointer", padding:"8px 18px",
            fontSize:13, fontFamily:"Georgia,serif", color:tab===t ? C : "#555",
            borderBottom:tab===t ? `2px solid ${C}` : "2px solid transparent",
            marginBottom:-1, transition:"color 0.15s",
          }}>{t}</button>
        ))}
      </div>

      {tab==="Overview" && (
        <div>
          <Card style={{ marginBottom:16 }}>
            <SLabel>Domain Distribution</SLabel>
            <div style={{ display:"flex", alignItems:"center", gap:32, flexWrap:"wrap" }}>
              <div style={{ position:"relative", width:260, height:260, flexShrink:0 }}>
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie data={domainData} cx="50%" cy="50%" innerRadius={80} outerRadius={115}
                      dataKey="count" activeIndex={activeSlice} activeShape={ActiveShape}
                      onMouseEnter={(_,i)=>setActiveSlice(i)} onMouseLeave={()=>setActiveSlice(null)}
                      startAngle={90} endAngle={-270} stroke="none">
                      {domainData.map((d,i)=>(
                        <Cell key={d.name} fill={d.color}
                          opacity={activeSlice===null||activeSlice===i ? 1 : 0.3}
                          style={{ cursor:"pointer", transition:"opacity 0.2s" }} />
                      ))}
                    </Pie>
                  </PieChart>
                </ResponsiveContainer>
                <div style={{ position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", textAlign:"center", pointerEvents:"none" }}>
                  {activeDomain ? (
                    <div>
                      <div style={{ fontSize:32, fontWeight:"bold", color:activeDomain.color, lineHeight:1 }}>
                        {Math.round(activeDomain.count/TOTAL*100)}%
                      </div>
                      <div style={{ fontSize:11, color:"#666", fontFamily:"monospace", marginTop:4 }}>{activeDomain.short}</div>
                    </div>
                  ) : (
                    <div style={{ fontSize:11, color:"#444", fontFamily:"monospace", lineHeight:1.8 }}>hover<br/>a slice</div>
                  )}
                </div>
              </div>

              <div style={{ flex:1, minWidth:200, display:"flex", flexDirection:"column", gap:14 }}>
                {domainData.map((d,i)=>(
                  <div key={d.name} onMouseEnter={()=>setActiveSlice(i)} onMouseLeave={()=>setActiveSlice(null)}
                    style={{ cursor:"pointer", transition:"transform 0.15s", transform:activeSlice===i ? "translateX(4px)" : "none" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                      <span style={{ fontSize:13, color:activeSlice===i ? d.color : "#aaa" }}>{d.name}</span>
                      <span style={{ fontSize:13, fontFamily:"monospace", color:"#666" }}>{d.count} <span style={{ color:"#444", fontSize:11 }}>/ {TOTAL}</span></span>
                    </div>
                    <div style={{ background:"#1e2030", borderRadius:4, height:6, overflow:"hidden" }}>
                      <div style={{ width:`${(d.count/TOTAL)*100}%`, height:"100%", background:d.color, borderRadius:4,
                        opacity:activeSlice===null||activeSlice===i ? 1 : 0.3, transition:"opacity 0.2s" }} />
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ width:200, transition:"opacity 0.2s", opacity:activeDomain ? 1 : 0 }}>
                {activeDomain && (
                  <div>
                    <div style={{ fontSize:10, color:activeDomain.color, fontFamily:"monospace", letterSpacing:"0.15em", marginBottom:10 }}>
                      {activeDomain.short} PER MEMBER
                    </div>
                    {[...memberDomains].sort((a,b)=>b.dc[activeDomain.name]-a.dc[activeDomain.name]).map(m=>(
                      <div key={m.name} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:7 }}>
                        <span style={{ fontSize:11, color:"#666", width:58, flexShrink:0 }}>{m.first}</span>
                        <div style={{ flex:1, background:"#1e2030", borderRadius:3, height:5 }}>
                          <div style={{ width:`${(m.dc[activeDomain.name]/5)*100}%`, height:"100%", background:activeDomain.color, borderRadius:3 }} />
                        </div>
                        <span style={{ fontSize:11, fontFamily:"monospace", color:"#555", width:12, textAlign:"right" }}>{m.dc[activeDomain.name]}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </Card>

          <Card style={{ marginBottom:16 }}>
            <SLabel>Most Shared Strengths — 3+ peoples top 10</SLabel>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))", gap:10 }}>
              {sharedStrengths.map(s=>(
                <div key={s.strength} onMouseEnter={()=>setActiveShared(s.strength)} onMouseLeave={()=>setActiveShared(null)}
                  style={{ background:activeShared===s.strength ? "#1e2030" : "#0f1117",
                    border:`1px solid ${activeShared===s.strength ? s.color+"66" : BORDER}`,
                    borderLeft:`3px solid ${s.color}`, borderRadius:8, padding:"10px 12px", transition:"all 0.15s", cursor:"default" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:6 }}>
                    <span style={{ fontSize:13, fontWeight:"bold", color:s.color }}>{s.strength}</span>
                    <span style={{ fontSize:18, fontWeight:"bold", color:s.color, fontFamily:"monospace" }}>{s.count}</span>
                  </div>
                  <Tag color={s.color}>{(DOMAIN_META[s.domain]||{short:"?"}).short} · {s.domain.split(" ")[0]}</Tag>
                  {activeShared===s.strength && (
                    <div style={{ marginTop:8, display:"flex", flexWrap:"wrap", gap:4 }}>
                      {s.who.map(w=>(
                        <span key={w} style={{ fontSize:10, color:"#888", fontFamily:"monospace", background:"#1a1c28", padding:"2px 6px", borderRadius:3 }}>{w}</span>
                      ))}
                    </div>
                  )}
                  <div style={{ display:"flex", gap:4, marginTop:8 }}>
                    {[...Array(9)].map((_,i)=>(
                      <div key={i} style={{ width:8, height:8, borderRadius:2, flexShrink:0,
                        background:i<s.count ? s.color : "#2a2d3a", opacity:i<s.count ? 1 : 0.4 }} />
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </Card>

          <Card>
            <SLabel>Individual Domain Profiles</SLabel>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                <thead>
                  <tr>
                    <th style={{ textAlign:"left", padding:"6px 10px", color:"#555", fontFamily:"monospace", fontWeight:"normal", fontSize:10, letterSpacing:"0.1em" }}>MEMBER</th>
                    {Object.entries(DOMAIN_META).map(([d,meta])=>(
                      <th key={d} style={{ textAlign:"center", padding:"6px 10px", color:meta.color, fontFamily:"monospace", fontWeight:"normal", fontSize:10, letterSpacing:"0.1em" }}>{meta.short}</th>
                    ))}
                    <th style={{ textAlign:"left", padding:"6px 10px", color:"#555", fontFamily:"monospace", fontWeight:"normal", fontSize:10 }}>DOMINANT</th>
                  </tr>
                </thead>
                <tbody>
                  {memberDomains.map((m,i)=>{
                    const dominant = Object.entries(m.dc).sort((a,b)=>b[1]-a[1])[0][0];
                    return (
                      <tr key={m.name} style={{ background:i%2===0 ? "#0f1117" : "transparent" }}>
                        <td style={{ padding:"7px 10px", color:"#ccc", fontWeight:"bold" }}>{m.name}</td>
                        {Object.entries(DOMAIN_META).map(([d,meta])=>{
                          const n=m.dc[d]; const isDom=d===dominant;
                          return (
                            <td key={d} style={{ textAlign:"center", padding:"7px 10px" }}>
                              <span style={{ display:"inline-block", minWidth:28, padding:"2px 6px", borderRadius:4,
                                fontFamily:"monospace", fontSize:13, fontWeight:isDom ? "bold" : "normal",
                                color:isDom ? meta.color : "#888", background:isDom ? meta.color+"22" : "transparent" }}>{n}</span>
                            </td>
                          );
                        })}
                        <td style={{ padding:"7px 10px" }}>
                          <Tag color={DOMAIN_META[dominant].color}>{DOMAIN_META[dominant].short} · {dominant}</Tag>
                        </td>
                      </tr>
                    );
                  })}
                  <tr style={{ borderTop:`1px solid ${BORDER}` }}>
                    <td style={{ padding:"8px 10px", color:"#555", fontFamily:"monospace", fontSize:10 }}>TEAM TOTAL</td>
                    {Object.entries(DOMAIN_META).map(([d,meta])=>(
                      <td key={d} style={{ textAlign:"center", padding:"8px 10px" }}>
                        <span style={{ fontFamily:"monospace", fontSize:13, fontWeight:"bold", color:meta.color }}>{domainTotals[d]}</span>
                      </td>
                    ))}
                    <td />
                  </tr>
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      )}

      {tab==="Overlap Heatmap" && (
        <Card>
          <SLabel>Shared Top-10 Strengths Between Any Two Members</SLabel>
          <p style={{ fontSize:12, color:"#555", marginTop:-4, marginBottom:20, lineHeight:1.6 }}>
            Each cell shows how many top-10 strengths two people share. Hover to see exactly which ones.
          </p>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:20, flexWrap:"wrap" }}>
            <span style={{ fontSize:11, color:"#555", fontFamily:"monospace" }}>shared:</span>
            {[0,1,2,3,4,5].map(n=>{
              const {bg,text}=heatColor(n);
              return <div key={n} style={{ width:28, height:28, borderRadius:5, background:bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color:text, fontFamily:"monospace", fontWeight:"bold" }}>{n}</div>;
            })}
          </div>
          <div style={{ overflowX:"auto" }}>
            <table style={{ borderCollapse:"separate", borderSpacing:4 }}>
              <thead>
                <tr>
                  <th style={{ width:72 }} />
                  {MEMBERS.map(m=>(
                    <th key={m.name} style={{ padding:"0 2px", width:48 }}>
                      <div style={{ fontSize:11, color:m.color, fontFamily:"monospace", writingMode:"vertical-rl", transform:"rotate(180deg)", height:72, display:"flex", alignItems:"center" }}>{m.first}</div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {MEMBERS.map((rowM,i)=>(
                  <tr key={rowM.name}>
                    <td style={{ paddingRight:10, textAlign:"right" }}>
                      <span style={{ fontSize:11, color:rowM.color, fontFamily:"monospace" }}>{rowM.first}</span>
                    </td>
                    {MEMBERS.map((colM,j)=>{
                      const isSelf=i===j;
                      const cell=overlap[i][j];
                      const isHov=hoverCell && hoverCell.row===i && hoverCell.col===j;
                      const {bg,text}=isSelf ? {bg:"#1e2030",text:"#333"} : heatColor(cell.count);
                      return (
                        <td key={colM.name} style={{ padding:0 }}
                          onMouseEnter={()=>!isSelf && setHoverCell({row:i,col:j,...cell,a:rowM.first,b:colM.first})}
                          onMouseLeave={()=>setHoverCell(null)}>
                          <div style={{ width:46, height:46, borderRadius:7, background:bg,
                            border:isHov ? `2px solid ${rowM.color}` : "2px solid transparent",
                            display:"flex", alignItems:"center", justifyContent:"center",
                            cursor:isSelf ? "default" : "pointer",
                            transition:"all 0.12s", transform:isHov ? "scale(1.12)" : "scale(1)" }}>
                            {isSelf
                              ? <div style={{ width:14, height:2, background:"#2a2d3a", borderRadius:1 }} />
                              : <span style={{ fontSize:16, fontFamily:"monospace", fontWeight:"bold", color:text }}>{cell.count}</span>
                            }
                          </div>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{ marginTop:24, minHeight:72 }}>
            {hoverCell ? (
              <div style={{ background:"#0f1117", borderRadius:10, padding:"16px 20px", border:`1px solid ${BORDER}` }}>
                <div style={{ fontSize:13, marginBottom:10 }}>
                  <span style={{ color:MEMBERS.find(m=>m.first===hoverCell.a).color, fontWeight:"bold" }}>{hoverCell.a}</span>
                  <span style={{ color:"#555" }}> and </span>
                  <span style={{ color:MEMBERS.find(m=>m.first===hoverCell.b).color, fontWeight:"bold" }}>{hoverCell.b}</span>
                  <span style={{ color:"#666", fontSize:12 }}> — {hoverCell.shared.length} shared strength{hoverCell.shared.length!==1?"s":""}</span>
                </div>
                {hoverCell.shared.length>0
                  ? <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                      {hoverCell.shared.map(s=>{
                        const domain=DOMAIN_MAP[s]||"Unknown";
                        return <Tag key={s} color={(DOMAIN_META[domain]||{color:"#888"}).color}>{s}</Tag>;
                      })}
                    </div>
                  : <span style={{ fontSize:12, color:"#444", fontFamily:"monospace" }}>No shared strengths in top 10</span>
                }
              </div>
            ) : (
              <div style={{ textAlign:"center", padding:"20px 0", color:"#2a2d3a", fontFamily:"monospace", fontSize:12 }}>
                hover any cell to see shared strengths
              </div>
            )}
          </div>
        </Card>
      )}

      {tab==="Radar Chart" && (
        <div>
          <Card style={{ marginBottom:16 }}>
            <SLabel>Team Average</SLabel>
            <div style={{ display:"flex", alignItems:"center", gap:40, flexWrap:"wrap" }}>
              <ResponsiveContainer width={260} height={240}>
                <RadarChart data={DOMAINS.map(d=>({ domain:DOMAIN_META[d].short, avg:Math.round((domainTotals[d]/9)*10)/10 }))}
                  margin={{ top:10, right:20, bottom:10, left:20 }}>
                  <PolarGrid stroke="#2a2d3a" />
                  <PolarAngleAxis dataKey="domain" tick={{ fill:"#888", fontSize:13, fontFamily:"monospace" }} />
                  <PolarRadiusAxis domain={[0,5]} tick={false} axisLine={false} />
                  <Radar dataKey="avg" stroke={C} fill={C} fillOpacity={0.1} dot={{ r:4, fill:C, strokeWidth:0 }} />
                </RadarChart>
              </ResponsiveContainer>
              <div style={{ flex:1, minWidth:200 }}>
                <p style={{ fontSize:12, color:"#555", marginBottom:16, lineHeight:1.7 }}>
                  Average top-10 themes per domain across all 9 members. The team skews toward Relationship Building with a notable Influencing gap.
                </p>
                {DOMAINS.map(d=>(
                  <div key={d} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                    <div style={{ width:8, height:8, borderRadius:2, background:DOMAIN_META[d].color, flexShrink:0 }} />
                    <span style={{ fontSize:12, color:"#777", width:170 }}>{d}</span>
                    <div style={{ flex:1, background:"#1e2030", borderRadius:3, height:5 }}>
                      <div style={{ width:`${(domainTotals[d]/TOTAL)*100}%`, height:"100%", background:DOMAIN_META[d].color, borderRadius:3 }} />
                    </div>
                    <span style={{ fontSize:12, fontFamily:"monospace", color:"#555", width:40, textAlign:"right" }}>
                      {(domainTotals[d]/9).toFixed(1)}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </Card>

          <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:20 }}>
            {MEMBERS.map(m=>{
              const on=visible.has(m.first);
              return (
                <button key={m.first} onClick={()=>toggleMember(m.first)} style={{
                  background:on ? m.color+"22" : "#161820",
                  border:`1px solid ${on ? m.color : BORDER}`,
                  borderRadius:20, padding:"5px 16px", cursor:"pointer",
                  fontSize:12, color:on ? m.color : "#555", transition:"all 0.15s",
                }}>{m.first}</button>
              );
            })}
            <button onClick={()=>setVisible(new Set(MEMBERS.map(m=>m.first)))}
              style={{ background:"none", border:`1px solid ${BORDER}`, borderRadius:20, padding:"5px 14px",
                cursor:"pointer", fontSize:11, color:"#555", fontFamily:"monospace", letterSpacing:"0.1em" }}>ALL</button>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(270px, 1fr))", gap:14 }}>
            {MEMBERS.filter(m=>visible.has(m.first)).map(m=>{
              const member=memberDomains.find(x=>x.first===m.first);
              const dominant=Object.entries(member.dc).sort((a,b)=>b[1]-a[1])[0][0];
              const radarData=DOMAINS.map(d=>({ domain:DOMAIN_META[d].short, value:member.dc[d] }));
              return (
                <Card key={m.first}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:2 }}>
                    <span style={{ fontSize:15, color:m.color, fontWeight:"bold" }}>{m.first}</span>
                    <Tag color={DOMAIN_META[dominant].color}>{DOMAIN_META[dominant].short}</Tag>
                  </div>
                  <div style={{ fontSize:11, color:"#444", marginBottom:8 }}>{m.name}</div>
                  <ResponsiveContainer width="100%" height={210}>
                    <RadarChart data={radarData} margin={{ top:8, right:20, bottom:8, left:20 }}>
                      <PolarGrid stroke="#2a2d3a" />
                      <PolarAngleAxis dataKey="domain" tick={{ fill:"#777", fontSize:12, fontFamily:"monospace" }} />
                      <PolarRadiusAxis domain={[0,5]} tick={false} axisLine={false} />
                      <Radar dataKey="value" stroke={m.color} fill={m.color} fillOpacity={0.25} dot={{ r:3, fill:m.color, strokeWidth:0 }} />
                    </RadarChart>
                  </ResponsiveContainer>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:4, marginTop:2 }}>
                    {DOMAINS.map(d=>(
                      <div key={d} style={{ display:"flex", alignItems:"center", gap:5 }}>
                        <div style={{ width:6, height:6, borderRadius:2, background:DOMAIN_META[d].color, flexShrink:0 }} />
                        <span style={{ fontSize:10, color:"#555" }}>{DOMAIN_META[d].short}: <span style={{ color:"#888" }}>{member.dc[d]}</span></span>
                      </div>
                    ))}
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {tab==="Most Likely To" && (
        <div>
          <p style={{ fontSize:13, color:"#555", marginBottom:24, fontFamily:"monospace", lineHeight:1.7 }}>
            Based purely on each persons CliftonStrengths profile. Click a card to reveal the answer.
          </p>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:14 }}>
            {MOST_LIKELY.map((item,i)=>{
              const isRevealed=revealed.has(i);
              return (
                <div key={i} onClick={()=>toggleReveal(i)} style={{
                  background:isRevealed ? "#161820" : "#0f1117",
                  border:`1px solid ${isRevealed ? item.color+"55" : BORDER}`,
                  borderTop:`3px solid ${isRevealed ? item.color : "#2a2d3a"}`,
                  borderRadius:12, padding:"20px",
                  cursor:"pointer", transition:"all 0.2s", userSelect:"none",
                }}>
                  <div style={{ fontSize:28, marginBottom:10 }}>{item.emoji}</div>
                  <div style={{ fontSize:14, color:"#ccc", lineHeight:1.5, marginBottom:16, minHeight:44 }}>
                    {item.question}
                  </div>
                  {!isRevealed && (
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ flex:1, height:1, background:BORDER }} />
                      <span style={{ fontSize:10, color:"#444", fontFamily:"monospace", letterSpacing:"0.15em" }}>CLICK TO REVEAL</span>
                      <div style={{ flex:1, height:1, background:BORDER }} />
                    </div>
                  )}
                  {isRevealed && (
                    <div className="fade-in">
                      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                        <div style={{ width:4, height:28, borderRadius:2, background:item.color, flexShrink:0 }} />
                        <span style={{ fontSize:18, fontWeight:"bold", color:item.color }}>{item.person}</span>
                      </div>
                      <p style={{ fontSize:12, color:"#888", lineHeight:1.7, margin:0 }}>{item.reason}</p>
                      <div style={{ marginTop:12, fontSize:10, color:"#333", fontFamily:"monospace", letterSpacing:"0.1em", textAlign:"right" }}>
                        CLICK TO HIDE
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div style={{ textAlign:"center", marginTop:40, fontSize:11, color:"#2a2d3a", fontFamily:"monospace", letterSpacing:"0.1em" }}>
        CLIFTONSTRENGTHS · GALLUP, INC. · GRANTS TEAM 2026
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Dashboard));
</script>
</body>
</html>
